<div class="auth-page">
  <div class="auth-card">
    <h1>Login</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="email" placeholder="you@example.com"
               [class.input-error]="isFieldInvalid('email')">
        @if (isFieldInvalid('email')) {
          <span class="field-error">Valid email is required.</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" formControlName="password" type="password" placeholder="Your password"
               [class.input-error]="isFieldInvalid('password')">
        @if (isFieldInvalid('password')) {
          <span class="field-error">Password is required.</span>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="submitting">
        {{ submitting ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
