<div class="auth-page">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="auth-subtitle">Register to manage devices</p>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" formControlName="name" type="text" placeholder="Your name"
               [class.input-error]="isFieldInvalid('name')">
        @if (isFieldInvalid('name')) {
          <span class="field-error">Name is required.</span>
        }
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" formControlName="email" type="email" placeholder="you@example.com"
               [class.input-error]="isFieldInvalid('email')">
        @if (isFieldInvalid('email')) {
          <span class="field-error">Valid email is required.</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" formControlName="password" type="password" placeholder="At least 6 characters"
               [class.input-error]="isFieldInvalid('password')">
        @if (isFieldInvalid('password')) {
          <span class="field-error">Password must be at least 6 characters.</span>
        }
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="submitting">
        {{ submitting ? 'Creating account...' : 'Register' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </div>
</div>
