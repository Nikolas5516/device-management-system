services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: device-mgmt-db
    restart: unless-stopped
    environment:
      MSSQL_SA_PASSWORD: "DevManager2026!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'DevManager2026!' -Q 'SELECT 1' -C"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  sqlserver-data:
